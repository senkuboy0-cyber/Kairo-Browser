name: Build debug APKs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build debug APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Build all debug APK splits
        run: gradle :app:assembleDebug --stacktrace

      - name: Collect ABI APKs
        run: |
          mkdir -p release
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            found=$(find app/build/outputs/apk/debug -type f -name "*${abi}*debug*.apk" | head -n 1)
            if [ -z "$found" ]; then
              echo "No APK found for ${abi}"
              find app/build/outputs/apk/debug -type f -name "*.apk"
              exit 1
            fi
            cp "$found" "release/Kairo-Browser-${abi}-debug.apk"
          done
          ls -lh release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kairo-Browser-debug-apks
          path: release/*.apk

      - name: Choose release tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=debug-manual-${{ github.run_number }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=debug-main-${{ github.run_number }}" >> "$GITHUB_ENV"
          fi

      - name: Publish debug APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Kairo Browser ${{ env.RELEASE_TAG }}
          body: Debug APKs for arm64-v8a, armeabi-v7a, x86, and x86_64.
          files: release/*.apk
          prerelease: true
