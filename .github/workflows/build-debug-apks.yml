name: Build debug APKs

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.abi }} debug APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APKs
        run: gradle :app:assembleDebug --stacktrace

      - name: Collect ABI APK
        run: |
          mkdir -p release
          found=$(find app/build/outputs/apk/debug -name "*${{ matrix.abi }}*debug*.apk" | head -n 1)
          if [ -z "$found" ]; then
            echo "No APK found for ${{ matrix.abi }}"
            find app/build/outputs/apk/debug -type f -name "*.apk"
            exit 1
          fi
          cp "$found" "release/Kairo-Browser-${{ matrix.abi }}-debug.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kairo-Browser-${{ matrix.abi }}-debug
          path: release/*.apk

  release:
    name: Publish debug APK release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('debug-{0}', github.run_number) }}
          name: Kairo Browser Debug ${{ github.ref_type == 'tag' && github.ref_name || github.run_number }}
          body: Debug APKs for arm64-v8a, armeabi-v7a, x86, and x86_64.
          files: release/*.apk
          prerelease: true
